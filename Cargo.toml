# Restriction lints
absolute_paths = "forbid"
alloc_instead_of_core = "forbid"
allow_attributes = "forbid"
allow_attributes_without_reason = "forbid"
arbitrary_source_item_ordering = "allow" # We really don't care about the order of fields in a struct, for example. It's often better for them to be packed together for performance, or to match the protocol.
arithmetic_side_effects = "allow" # I don't think we need Clippy telling us `3+4` is dangerous...
as_conversions = "deny" # There are some cases when as conversions are necessary. But they should be avoided at all costs.
as_pointer_underscore = "forbid"
as_underscore = "forbid"
assertions_on_result_states = "forbid"
big_endian_bytes = "allow" # We are working with a network protocol, so big-endian byte order is needed.
cfg_not_test = "forbid"
clone_on_ref_ptr = "forbid"
cognitive_complexity = "forbid"
create_dir = "forbid"
dbg_macro = "forbid"
decimal_literal_representation = "forbid"
default_numeric_fallback = "allow" # `7` is perfectly fine instead of `7_i32`, same with `3.5` instead of `3.5_f32`. Either should be acceptable.
default_union_representation = "forbid"
deref_by_slicing = "forbid"
disallowed_script_idents = "forbid"
doc_include_without_cfg = "forbid"
