error_impl_error = "forbid"
exhaustive_enums = "allow" # Library users should be able to construct enums, even if they may later change, we can't achieve non-breaking changes just by stopping people from doing basic things.
exhaustive_structs = "allow" # Library users should be able to construct structs, even if they may later change, we can't achieve non-breaking changes just by stopping people from doing basic things.
exit = "forbid"
expect_used = "forbid"
field_scoped_visibility_modifiers = "forbid"
filetype_is_file = "forbid"
float_arithmetic = "allow" # Floating point arithmetic is fine, Meloncraft won't run anywhere where it will cause particular performance issues, and we need floats for game logic.
float_cmp_const = "forbid"
fn_to_numeric_cast_any = "forbid"
get_unwrap = "allow" # All code which can panic should explicitly call a panicking function, like `unwrap` or `panic!`. This makes it easier to audit the codebase for potential panics, and makes it clearer when reading the code that a panic may occur.
host_endian_bytes = "forbid"
if_then_some_else_none = "forbid"
impl_trait_in_params = "forbid"
implicit_return = "forbid"
indexing_slicing = "deny" # The only time index slicing is acceptable is when assigning to an element in a collection, e.g. `vec[0] = 5`. Otherwise, it is too easy to accidentally cause panics by indexing out of bounds, and you should use vec.get(0) (and unwrap if you are sure the index is valid). Don't use slicing.
infinite_loop = "forbid"
inline_asm_x86_att_syntax = "forbid"
inline_asm_x86_intel_syntax = "forbid"
integer_division = "allow"
integer_division_remainder_used = "allow"
iter_over_hash_type = "warn" # This can be perfectly fine, but it's worth warning about since sometimes you need to iterate over an **ordered** collection, but accidentally iterate over a HashMap or HashSet, etc.
large_include_file = "forbid"
let_underscore_must_use = "forbid"
let_underscore_untyped = "forbid"
little_endian_bytes = "forbid"
lossy_float_literal = "forbid"
map_err_ignore = "allow" # This will be forbidden upon changing net_deserialize to return the error, not just Result<Self, ()>. Until then, this is banned in future code but allowed in existing code.
map_with_unused_argument_over_ranges = "forbid"
mem_forget = "forbid"
min_ident_chars = "allow" # Short identifiers can sometimes be fine (e.g. x,y, r,g,b, pr,pw), but are discouraged.
