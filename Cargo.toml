[workspace]
resolver = "3"
members = ["src/meloncraft_network", "src/meloncraft_packets", "src/meloncraft_protocol_types", "src/meloncraft_client", "src/meloncraft_handshaking", "src/meloncraft_server_list", "src/meloncraft_player", "src/meloncraft_nbt", "src/meloncraft_login", "src/meloncraft_registry", "src/meloncraft_core", "src/meloncraft_text", "src/meloncraft_default_registries", "src/meloncraft_generator", "src/meloncraft_chunk", "tools/block_state_generator", "src/meloncraft_block"]
exclude = [
    "examples"
]

[workspace.dependencies.bevy]
version = "0.17.3"
default-features = false
features = ["debug"]

[package]
name = "meloncraft"
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
meloncraft_protocol_types = { path = "src/meloncraft_protocol_types" }
meloncraft_network = { path = "src/meloncraft_network" }
meloncraft_client = { path = "src/meloncraft_client" }
meloncraft_packets = { path = "src/meloncraft_packets" }
meloncraft_handshaking = { path = "src/meloncraft_handshaking" }
meloncraft_server_list = { path = "src/meloncraft_server_list" }
meloncraft_player = { path = "src/meloncraft_player" }
meloncraft_nbt = { path = "src/meloncraft_nbt" }
meloncraft_login = { path = "src/meloncraft_login" }
meloncraft_init_play = { path = "src/meloncraft_init_play" }
meloncraft_registry = { path = "src/meloncraft_registry" }
meloncraft_default_registries = { path = "src/meloncraft_default_registries" }
meloncraft_core = { path = "src/meloncraft_core" }
meloncraft_text = { path = "src/meloncraft_text" }
meloncraft_generator = { path = "src/meloncraft_generator" }
meloncraft_block = { path = "src/meloncraft_block" }
meloncraft_chunk = { path = "src/meloncraft_chunk" }

lazy_static = "1.5.0"

[dependencies]
meloncraft_protocol_types = { workspace = true }
meloncraft_network = { workspace = true }
meloncraft_client = { workspace = true }
meloncraft_packets = { workspace = true }
meloncraft_handshaking = { workspace = true }
meloncraft_server_list = { workspace = true }
meloncraft_player = { workspace = true }
meloncraft_nbt = { workspace = true }
meloncraft_login = { workspace = true }
meloncraft_init_play = { workspace = true }
meloncraft_registry = { workspace = true }
meloncraft_default_registries = { workspace = true }
meloncraft_core = { workspace = true }
meloncraft_text = { workspace = true }
#meloncraft_generator = { workspace = true }
meloncraft_block = { workspace = true }
meloncraft_chunk = { workspace = true }

